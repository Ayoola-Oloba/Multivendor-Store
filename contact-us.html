<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="contact-us.css">
    <script type="text/javascript" src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <title>Document</title>
</head>
<body>
    <header>
        <div class="container">
            <div class="top">
                <a href="index.html"><h1>OIA</h1></a>
                <nav class="navbar">
                    <a href="index 2.html">Shop</a>
                    <a href="about-us.html">About Us</a>
                </nav>
            </div>
        </div>
    </header>
    <main>
        <div class="container">
                <div class="contact-form">
                    <h2>Contact Us</h2>
                    <form id="contactForm">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                        <div id="nameError" class="error"></div>
            
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                        <div id="emailError" class="error"></div>
            
                        <label for="subject">Subject:</label>
                        <input type="text" id="subject" name="subject">
            
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" required></textarea>
                        <div id="messageError" class="error"></div>
            
                        <button type="submit">Submit</button>
                    </form>
                    <div id="formMessage"></div>
                </div>
        </div>
    </main>
    <footer>
        <div class="container">
            <div class="bottom">
                <a href="index.html">Home</a>
                <hr>
                <a href="cloth.html">Clothing</a>
                <hr>
                <a href="food.html">Food</a>
                <hr>
                <a href="shelter.html">Shelter</a>
                <hr>
                <a href="tech.html">Tech</a>
                <hr>
                <a href="about-us.html">About Us</a>
            </div>
        </div>
    </footer>
    <script>
        document.getElementById("contactForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Prevents the default form submission behavior

            // Clear previous error messages
            document.getElementById("nameError").textContent = "";
            document.getElementById("emailError").textContent = "";
            document.getElementById("messageError").textContent = "";
            document.getElementById("formMessage").textContent = "";

            // Get form values
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const subject = document.getElementById("subject").value.trim();
            const message = document.getElementById("message").value.trim();

            let isValid = true;

            // Validate form fields
            if (name === "") {
                document.getElementById("nameError").textContent = "Name is required.";
                isValid = false;
            }
            if (email === "") {
                document.getElementById("emailError").textContent = "Email is required.";
                isValid = false;
            } else if (!/\S+@\S+\.\S+/.test(email)) {
                document.getElementById("emailError").textContent = "Please enter a valid email.";
                isValid = false;
            }
            if (message === "") {
                document.getElementById("messageError").textContent = "Message is required.";
                isValid = false;
            }

            if (isValid) {
                // Use an email sending service, like EmailJS (or Formspree, etc.)
                sendEmail(name, email, subject, message);
            }
        });
        function sendEmail(name, email, subject, message) {
        emailjs.send("OIA24", "template_Market", {
            user_name: name,
            user_email: email,
            subject: subject,
            message: message,
        })
        .then(function(response) {
            document.getElementById("formMessage").textContent = "Thank you for your message! We will get back to you soon.";
            document.getElementById("contactForm").reset();
        }, function(error) {
            document.getElementById("formMessage").textContent = "Sorry, something went wrong. Please try again.";
        });
        }
    </script>
</body>
<script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
</html>
