<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Player</title>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      let audio = document.getElementById('audioPlayer');
      if (!audio) {
        audio = new Audio('LIKE THAT (1).mp3');
        audio.id = 'audioPlayer';
        audio.loop = true;
        document.body.appendChild(audio);
      }

      // Set playback position from local storage
      let savedTime = localStorage.getItem('audioCurrentTime');
      if (savedTime) {
        audio.currentTime = parseFloat(savedTime);
      }
      
      audio.play();

      // Save playback position to local storage
      audio.addEventListener('timeupdate', function () {
        localStorage.setItem('audioCurrentTime', audio.currentTime);
      });

      // Clear playback position on unload (optional)
      window.addEventListener('beforeunload', function () {
        localStorage.removeItem('audioCurrentTime');
      });
    });
  </script>
</head>
<body>
  <audio id="audioPlayer" controls style="display:none;">
    <source src="LIKE THAT (1).mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
